name: 🌐 Search, Fetch & Download

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '🎯 حالت'
        required: true
        type: choice
        options:
          - search (جستجوی وب)
          - fetch (واکشی صفحه و استخراج لینک‌ها)
          - download (دانلود مستقیم)
        default: 'search (جستجوی وب)'
      query:
        description: '🔍 عبارت | 🌐 لینک صفحه | 🔗 لینک مستقیم'
        required: true
        type: string
      filename:
        description: '📝 اسم فایل (فقط برای دانلود)'
        required: false
        type: string
        default: ''
      max_items:
        description: '🔢 حداکثر نتایج'
        required: false
        type: number
        default: 10
      split_mb:
        description: '📦 تکه > MB'
        required: false
        type: number
        default: 70

jobs:
  main:
    name: ⚡️ همه‌کاره
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛠️ نصب
        run: |
          sudo apt-get update -qq 2>/dev/null || true
          sudo apt-get install -y -qq wget zip python3-pip 2>/dev/null || true
          pip3 install -q requests beautifulsoup4 2>/dev/null
          echo "✅ آماده!"

      - name: 🎯 اجرا
        env:
          MODE: ${{ github.event.inputs.mode }}
          QUERY: ${{ github.event.inputs.query }}
          FILENAME: ${{ github.event.inputs.filename }}
          MAX: ${{ github.event.inputs.max_items }}
          SPLIT_MB: ${{ github.event.inputs.split_mb }}
        run: |
          python3 << 'PYEOF'
          import os, sys, re, subprocess
          from pathlib import Path
          from datetime import datetime
          from urllib.parse import urljoin, urlparse
          import requests
          from bs4 import BeautifulSoup

          mode = os.environ['MODE']
          query = os.environ['QUERY'].strip()
          filename = os.environ.get('FILENAME', '')
          max_items = int(os.environ.get('MAX', 10))
          split_mb = int(os.environ.get('SPLIT_MB', 70))
          H = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}

          # ========================
          #  MODE 1: SEARCH (باگ fix)
          # ========================
          if mode == 'search (جستجوی وب)':
              print(f'🔍 جستجو: {query}')
              resp = requests.post('https://html.duckduckgo.com/html/', data={'q': query}, headers=H, timeout=15)
              if resp.status_code == 200:
                  soup = BeautifulSoup(resp.text, 'html.parser')
                  results = []
                  for item in soup.select('.result')[:max_items]:
                      title_elem = item.select_one('.result__title a')
                      if not title_elem:
                          title_elem = item.select_one('.result__title')
                      if not title_elem:
                          continue
                      
                      title = title_elem.get_text(strip=True)[:80]
                      link = ''
                      
                      # لینک: اول href مستقیم
                      if title_elem.get('href'):
                          link = title_elem.get('href')
                      else:
                          # لینک داخل متن
                          link_match = re.search(r'https?://[^\s]+', title_elem.get_text())
                          if link_match:
                              link = link_match.group(0)
                      
                      # اگر هنوز link خالیه
                      if not link:
                          link_elem = item.select_one('a[href]')
                          if link_elem:
                              link = link_elem.get('href', '')
                      
                      # تمیز کردن لینک DuckDuckGo
                      if 'uddg=' in link:
                          link = link.split('uddg=')[-1].split('&')[0]
                          link = requests.utils.unquote(link)
                      
                      # دیسکریپشن
                      snippet = item.select_one('.result__snippet')
                      desc = snippet.get_text(strip=True)[:150] if snippet else ''
                      
                      if link:
                          results.append({'title': title, 'url': link, 'desc': desc})
                  
                  if results:
                      ts = datetime.now().strftime('%Y-%m-%d_%H-%M-%S')
                      qs = re.sub(r'[^\w]', '_', query)[:30]
                      Path('searches').mkdir(parents=True, exist_ok=True)
                      f = Path(f'searches/{qs}_{ts}.md')
                      md = f'# 🔍 {query}\n\n| # | Title | Description | Link |\n|---|-------|-------------|------|\n'
                      for i, r in enumerate(results, 1):
                          md += f'| {i} | {r["title"][:50]} | {r["desc"][:100]} | [Link]({r["url"]}) |\n'
                      f.write_text(md)
                      print(f'✅ گزارش: {f}')
                  else:
                      print('😞 هیچی پیدا نشد')

          # ========================
          #  MODE 2: FETCH
          # ========================
          elif mode == 'fetch (واکشی صفحه و استخراج لینک‌ها)':
              url = query if query.startswith('http') else 'https://' + query
              print(f'🕷️ واکشی: {url}')
              try:
                  resp = requests.get(url, headers=H, timeout=15, allow_redirects=True)
                  if resp.status_code != 200:
                      print(f'❌ خطای {resp.status_code}')
                      sys.exit(1)
                  
                  soup = BeautifulSoup(resp.text, 'html.parser')
                  base_url = resp.url
                  domain = urlparse(base_url).netloc.replace(':', '_')
                  ts = datetime.now().strftime('%Y%m%d_%H%M%S')
                  out_dir = Path(f'fetched/{domain}_{ts}')
                  out_dir.mkdir(parents=True, exist_ok=True)
                  
                  # ذخیره HTML
                  (out_dir / 'page.html').write_text(resp.text, encoding='utf-8')
                  
                  # استخراج لینک‌ها
                  links = set()
                  for tag in soup.find_all(['a', 'video', 'source', 'iframe']):
                      href = tag.get('href') or tag.get('src')
                      if href and not href.startswith('data:') and not href.startswith('javascript:'):
                          links.add(urljoin(base_url, href))
                  
                  found = re.findall(r'https?://[^\s"\'<>]+', resp.text)
                  for f in found:
                      if len(f) < 500:
                          links.add(f)
                  
                  with open(out_dir / 'links.txt', 'w') as lf:
                      lf.write(f'لیست لینک‌ها از:\n{base_url}\n')
                      lf.write('='*60 + '\n\n')
                      for i, link in enumerate(sorted(links), 1):
                          lf.write(f'{i}. {link}\n')
                  
                  print(f'✅ {out_dir}')
                  print(f'📄 {len(links)} لینک')
              except Exception as e:
                  print(f'❌ {e}')

          # ========================
          #  MODE 3: DOWNLOAD
          # ========================
          elif mode == 'download (دانلود مستقیم)':
              url = query if query.startswith('http') else 'https://' + query
              fname = filename if filename else url.split('/')[-1].split('?')[0] or f'file_{datetime.now().strftime("%H%M%S")}'
              fname = fname.replace(' ', '_')
              
              print(f'📥 {fname}')
              safe_name = re.sub(r'[<>:"/\\|?*]', '_', fname.rsplit('.', 1)[0])[:40]
              out_dir = Path(f'downloads/{safe_name}')
              out_dir.mkdir(parents=True, exist_ok=True)
              fpath = out_dir / fname
              
              subprocess.run(['wget', '--no-check-certificate', '--max-redirect=10', '-O', str(fpath), url], check=False)
              
              if fpath.exists() and fpath.stat().st_size > 0:
                  sz = fpath.stat().st_size / 1e6
                  print(f'✅ {sz:.1f}MB')
                  if split_mb > 0 and sz > split_mb:
                      print(f'✂️ تیکه...')
                      subprocess.run(['zip', '-j', '-s', f'{split_mb}m', str(out_dir / f'{safe_name}.zip'), str(fpath)], check=False)
                      if list(out_dir.glob(f'{safe_name}.z*')):
                          fpath.unlink()
              else:
                  print('❌ ناموفق!')
          PYEOF

      - name: 📤 آپلود
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          mkdir -p searches fetched downloads
          git add searches/ fetched/ downloads/ 2>/dev/null
          git diff --cached --quiet && exit 0
          git commit -m "📦 ${MODE}: ${QUERY:0:50}" --quiet
          git push --quiet 2>/dev/null || git push --quiet 2>/dev/null || git push --quiet 2>/dev/null
