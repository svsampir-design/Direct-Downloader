name: 📥 Direct Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: '🔗 لینک مستقیم فایل'
        required: true
        type: string
      filename:
        description: '📝 اسم فایل (اختیاری)'
        required: false
        type: string
        default: ''
      split_mb:
        description: '📦 تکه > MB (0=نه)'
        required: false
        type: number
        default: 70

jobs:
  download:
    name: ⚡️ دانلود مستقیم
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📥 دانلود
        env:
          URL: ${{ github.event.inputs.url }}
          FILENAME: ${{ github.event.inputs.filename }}
          SPLIT_MB: ${{ github.event.inputs.split_mb }}
        run: |
          URL="$URL"
          FILENAME="$FILENAME"
          SPLIT_MB="$SPLIT_MB"
          
          # اسم فایل
          if [ -z "$FILENAME" ]; then
              FILENAME=$(echo "$URL" | sed 's/[?#].*//' | sed 's/.*\///' | sed 's/%20/ /g')
          fi
          [ -z "$FILENAME" ] && FILENAME="download_$(date +%s)"
          
          echo "📥 دانلود: $FILENAME"
          
          # دانلود (ساده و بدون خطا)
          curl -L -k -o "/tmp/$FILENAME" "$URL" -A "Mozilla/5.0"
          
          if [ -f "/tmp/$FILENAME" ] && [ -s "/tmp/$FILENAME" ]; then
              SIZE=$(du -h "/tmp/$FILENAME" | cut -f1)
              echo "✅ دانلود شد: $SIZE"
              
              NAME=$(echo "$FILENAME" | sed 's/\.[^.]*$//' | tr ' ' '_')
              OUT_DIR="downloads/$NAME"
              mkdir -p "$OUT_DIR"
              mv "/tmp/$FILENAME" "$OUT_DIR/"
              
              SIZE_BYTES=$(stat -c%s "$OUT_DIR/$FILENAME")
              SIZE_MB=$((SIZE_BYTES / 1048576))
              echo "📦 $SIZE_MB MB"
              
              # تیکه‌تکه کردن
              if [ "$SPLIT_MB" -gt 0 ] && [ "$SIZE_MB" -gt "$SPLIT_MB" ]; then
                  echo "✂️ تیکه..."
                  cd "$OUT_DIR"
                  zip -j -s ${SPLIT_MB}m "$NAME.zip" "$FILENAME"
                  rm "$FILENAME"
                  cd -
                  
                  echo "# 📦 $NAME" > "$OUT_DIR/README.md"
                  echo "" >> "$OUT_DIR/README.md"
                  echo "| # | File |" >> "$OUT_DIR/README.md"
                  echo "|---|------|" >> "$OUT_DIR/README.md"
                  for PART in $(ls "$OUT_DIR" | grep -v README | sort); do
                      echo "|   | $PART |" >> "$OUT_DIR/README.md"
                  done
              fi
          else
              echo "❌ دانلود ناموفق!"
              exit 1
          fi

      - name: 📤 آپلود
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add downloads/ 2>/dev/null
          git diff --cached --quiet && exit 0
          git commit -m "📥 ${FILENAME:0:50}" --quiet
          git push --quiet 2>/dev/null || git push --quiet 2>/dev/null || git push --quiet 2>/dev/null
